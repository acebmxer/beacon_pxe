name: Publish images

# Builds the five Beacon images and pushes them to GitHub Container Registry
# (ghcr.io/acebmxer/beacon-<service>).
#
#   - push to main           -> :latest (+ :main-<sha>)
#   - push a tag like v1.2.3  -> :1.2.3, :1.2, :latest
#   - manual run (workflow_dispatch)
#
# No secrets to configure: the built-in GITHUB_TOKEN authenticates to GHCR.
# After the first run, make each package public under the repo's Packages tab
# (or the org settings) so users can pull without logging in.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: ./web
          - name: nginx
            context: ./http
          - name: dnsmasq
            context: ./dnsmasq
          - name: nfs
            context: ./nfs
          - name: smb
            context: ./smb
          - name: reload
            context: ./reload
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/beacon-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=beacon-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=beacon-${{ matrix.name }}
