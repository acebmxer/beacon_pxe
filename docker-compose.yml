# Beacon — Docker Compose stack (prebuilt images)
#
# This file plus a .env is all you need — no repo checkout, no local build:
#
#   1. Copy this file and .env.example into an empty directory
#   2. Rename .env.example to .env and edit SERVER_IP / BOOT_INTERFACE / etc.
#   3. docker compose up -d
#
# Images are published to GitHub Container Registry (GHCR) and pulled on up.
# To build locally from source instead, use docker-compose.dev.yml.
#
# Services:
#   web     - FastAPI management UI + API (auth, settings, images, users)
#   nginx   - HTTP boot root served to iPXE clients (menu, kernels, initrds, ISOs)
#   dnsmasq - proxyDHCP / DHCP + TFTP; iPXE binaries baked in; HOST networking
#   nfs     - exports each image's live filesystem to clients; HOST net, privileged
#   reload  - restarts dnsmasq when the web app regenerates its config
#
# Persistent state: ./data (sqlite + uploaded images), plus the named volumes
# below (bootroot = generated boot files, nfsroot = unpacked live filesystems,
# dnsmasqconf = generated dnsmasq.conf shared between web/dnsmasq/reload).

services:
  web:
    image: ghcr.io/acebmxer/beacon-web:latest
    container_name: beacon_web
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      BOOTROOT_DIR: /bootroot
      IMAGE_DIR: /images
      DNSMASQ_DIR: /dnsmasq
      NFS_DIR: /nfs
    volumes:
      - ./data:/data
      - bootroot:/bootroot
      - ${IMAGE_PATH:-./data/images}:/images
      - dnsmasqconf:/dnsmasq
      # Live filesystems extracted from ISOs, served to clients by the nfs service.
      - nfsroot:/nfs
    ports:
      - "${WEB_PORT:-8080}:8080"

  nginx:
    image: ghcr.io/acebmxer/beacon-nginx:latest
    container_name: beacon_nginx
    restart: unless-stopped
    volumes:
      - bootroot:/usr/share/nginx/bootroot:ro
      # Served at /images/ via an alias (kept out of the read-only bootroot mount).
      - ${IMAGE_PATH:-./data/images}:/srv/images:ro
    ports:
      - "80:80"

  dnsmasq:
    image: ghcr.io/acebmxer/beacon-dnsmasq:latest
    container_name: beacon_dnsmasq
    restart: unless-stopped
    network_mode: host
    # host networking binds fixed ports (53/67/69); init reaps the process
    # cleanly and the grace period lets the kernel release those ports before
    # the new container is recreated, avoiding "address already in use" on
    # rolling updates (e.g. Dockhand).
    init: true
    stop_grace_period: 30s
    cap_add:
      - NET_ADMIN
    volumes:
      - dnsmasqconf:/dnsmasq:ro

  # Serves each image's live filesystem (extracted from its ISO) over NFS so
  # clients mount it on demand instead of downloading the whole ISO into RAM.
  # Needs host networking + privileged for the in-kernel NFS server; the host
  # must provide the nfsd kernel module (standard on Linux).
  nfs:
    image: ghcr.io/acebmxer/beacon-nfs:latest
    container_name: beacon_nfs
    restart: unless-stopped
    network_mode: host
    privileged: true
    # Same rationale as dnsmasq: host net binds 2049/111. Give the in-kernel
    # NFS server time to unexport and release ports on stop so recreation on a
    # rolling update doesn't collide with the old container's bindings.
    init: true
    stop_grace_period: 30s
    volumes:
      - nfsroot:/nfs:ro
      - /lib/modules:/lib/modules:ro

  # Restarts dnsmasq when web regenerates its config. Avoids mounting the Docker
  # socket into the web app: this sidecar owns the privileged restart instead.
  reload:
    image: ghcr.io/acebmxer/beacon-reload:latest
    container_name: beacon_reload
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dnsmasqconf:/dnsmasq:ro
    depends_on:
      - dnsmasq

volumes:
  bootroot:
  nfsroot:
  dnsmasqconf:
