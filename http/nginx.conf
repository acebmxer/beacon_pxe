# Serves the HTTP boot root to iPXE clients.
#   /            -> boot.ipxe, kernels, initrds (the "bootroot" volume)
#   /images/     -> uploaded ISO files (read-only)
#   /track/      -> reverse-proxied to the web app (deploy tracking)
# Large files (ISOs, initrds) are served with sendfile for speed.

# The web management app, reachable by service name on the compose network.
upstream beacon_web {
    server web:8080;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/bootroot;
    autoindex on;

    sendfile on;
    tcp_nopush on;
    # iPXE streams large files; keep generous timeouts.
    client_max_body_size 0;
    send_timeout 600s;

    location / {
        try_files $uri $uri/ =404;
    }

    # Uploaded ISO images live outside the boot root and are aliased here.
    location /images/ {
        alias /srv/images/;
        autoindex on;
    }

    # Correct content type so iPXE treats the menu as a script.
    location = /boot.ipxe {
        default_type text/plain;
    }

    # Deploy tracking: the iPXE menu pings http://<server>/track/<id> just before
    # booting an image (see web ipxe.py). The web app lives on :8080, so proxy
    # /track/ to it; this lets the menu use the single boot-url (port 80) for
    # everything. The real client IP is forwarded so the web app can record it.
    location /track/ {
        proxy_pass http://beacon_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
