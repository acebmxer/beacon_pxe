# Serves the HTTP boot root to iPXE clients.
#   /            -> boot.ipxe, kernels, initrds (the "bootroot" volume)
#   /images/     -> uploaded ISO files (read-only)
# Large files (ISOs, initrds) are served with sendfile for speed.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/bootroot;
    autoindex on;

    sendfile on;
    tcp_nopush on;
    # iPXE streams large files; keep generous timeouts.
    client_max_body_size 0;
    send_timeout 600s;

    location / {
        try_files $uri $uri/ =404;
    }

    # Uploaded ISO images live outside the boot root and are aliased here.
    location /images/ {
        alias /srv/images/;
        autoindex on;
    }

    # Correct content type so iPXE treats the menu as a script.
    location = /boot.ipxe {
        default_type text/plain;
    }
}
