# Minimal Samba config: one read-only, guest-accessible share of the unpacked
# Windows install media. WinPE maps \\<server-ip>\install and runs setup.exe.
#
# Guest access (no password) is deliberate: WinPE's startnet.cmd connects without
# credentials, and the share holds only public OS install files on a boot LAN.
[global]
   workgroup = WORKGROUP
   server string = Beacon install media
   security = user
   map to guest = Bad User
   guest account = nobody
   # SMB1 is disabled by default in modern Samba; WinPE speaks SMB2/3.
   server min protocol = SMB2
   log level = 1
   # Host networking: bind to all interfaces.
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

[install]
   comment = Windows install media
   path = /srv/install
   browseable = yes
   read only = yes
   guest ok = yes
   guest only = yes
   force user = nobody
   # WinPE launches setup.exe straight off this share. 7z unpacks the ISO with
   # mode 644 (no execute bit), and smbd otherwise answers an open-for-execute
   # with ACCESS_DENIED when the POSIX x bit is missing — Setup fails with
   # "Access is denied" even though reads succeed. The media is read-only and
   # serves executables by design, so always allow execute.
   acl allow execute always = yes
