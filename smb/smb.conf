# Minimal Samba config: one read-only, guest-accessible share of the unpacked
# Windows install media. WinPE maps \\<server-ip>\install and runs setup.exe.
#
# Guest access (no password) is deliberate: WinPE's startnet.cmd connects without
# credentials, and the share holds only public OS install files on a boot LAN.
[global]
   workgroup = WORKGROUP
   server string = Beacon install media
   security = user
   map to guest = Bad User
   guest account = nobody
   # SMB1 is disabled by default in modern Samba; WinPE speaks SMB2/3.
   server min protocol = SMB2
   log level = 1
   # Reap dead client connections FAST. A client reset mid-install (routine when
   # testing) never closes its SMB session, so the kernel keeps the socket
   # ESTABLISHED until TCP keepalive fires -- 2 hours by default. WinPE picks the
   # same ephemeral port on every cold boot, so the next attempt's SYN lands on
   # that still-live 4-tuple. The kernel answers with an RFC 5961 challenge ACK
   # rather than a SYN-ACK; WinPE never sends the RST that would clear the stale
   # connection and just retransmits the same SYN until it gives up. It surfaces
   # as "System error 53 / the network path was not found", which looks exactly
   # like broken install media even though the media is fine.
   #
   # A *successful* install is what creates the zombie, so this bites the boot
   # AFTER a good one. The socket therefore has to die before WinPE stops
   # retrying: 15s idle + 2 probes 5s apart = gone in ~25s, well inside the retry
   # window in images.py (_winpeshl_cmd -- keep the two in sync). Per-socket, so
   # no host-wide sysctls, which matters as this container uses host networking.
   socket options = TCP_NODELAY SO_KEEPALIVE TCP_KEEPIDLE=15 TCP_KEEPINTVL=5 TCP_KEEPCNT=2
   # Host networking: bind to all interfaces.
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

[install]
   comment = Windows install media
   path = /srv/install
   browseable = yes
   read only = yes
   guest ok = yes
   guest only = yes
   force user = nobody
   # WinPE launches setup.exe straight off this share. 7z unpacks the ISO with
   # mode 644 (no execute bit), and smbd otherwise answers an open-for-execute
   # with ACCESS_DENIED when the POSIX x bit is missing — Setup fails with
   # "Access is denied" even though reads succeed. The media is read-only and
   # serves executables by design, so always allow execute.
   acl allow execute always = yes
